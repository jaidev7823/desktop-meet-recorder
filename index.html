<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BriefBridge Recorder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: '#0b1220',
            panel: '#111a2b',
            line: '#25324a',
            ok: '#22c55e',
            warn: '#f59e0b',
            danger: '#ef4444',
            calm: '#38bdf8'
          },
          boxShadow: {
            glow: '0 0 0 1px rgba(56,189,248,0.28), 0 8px 22px rgba(15,23,42,0.45)',
          },
          fontFamily: {
            display: ['ui-sans-serif', 'system-ui', 'Segoe UI', 'sans-serif'],
            mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace']
          }
        }
      }
    };
  </script>
</head>
<body class="bg-ink text-slate-100 font-display antialiased min-h-screen">
  <main class="max-w-5xl mx-auto p-6 md:p-8">
    <section class="rounded-2xl bg-panel/90 border border-line shadow-glow overflow-hidden">
      <header class="flex items-center justify-between px-6 py-4 border-b border-line">
        <div>
          <p class="text-calm tracking-[0.22em] text-xs font-semibold uppercase">BriefBridge</p>
          <h1 class="text-xl md:text-2xl font-semibold mt-1">Desktop Meet Recorder</h1>
        </div>
        <div class="flex items-center gap-3">
          <span id="titleDot" class="w-3 h-3 rounded-full bg-slate-500"></span>
          <span id="statusText" class="text-xs md:text-sm text-slate-300">Idle</span>
        </div>
      </header>

      <div class="p-6 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="rounded-xl border border-line bg-ink/60 p-4">
            <p class="text-xs uppercase tracking-[0.18em] text-slate-400">Session Status</p>
            <div class="mt-3 flex items-center gap-3">
              <span id="statusIndicator" class="w-3 h-3 rounded-full bg-slate-500"></span>
              <p id="statusLabel" class="font-medium">Waiting for call</p>
            </div>
          </div>

          <div class="rounded-xl border border-line bg-ink/60 p-4">
            <p class="text-xs uppercase tracking-[0.18em] text-slate-400">Timer</p>
            <p id="timer" class="mt-3 text-2xl font-mono">00:00:00</p>
          </div>

          <div class="rounded-xl border border-line bg-ink/60 p-4">
            <p class="text-xs uppercase tracking-[0.18em] text-slate-400">Auto Record</p>
            <button id="autoToggle" class="mt-3 inline-flex items-center px-3 py-2 rounded-lg border border-line text-sm bg-slate-800 hover:bg-slate-700 transition">
              Enabled
            </button>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="rounded-xl border border-line bg-ink/60 p-4">
            <label for="micSelect" class="block text-xs uppercase tracking-[0.18em] text-slate-400">Microphone</label>
            <select id="micSelect" class="mt-2 w-full bg-slate-900 border border-line rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-calm/70">
              <option>Loading...</option>
            </select>
          </div>

          <div class="rounded-xl border border-line bg-ink/60 p-4">
            <label for="stereoSelect" class="block text-xs uppercase tracking-[0.18em] text-slate-400">System Audio</label>
            <select id="stereoSelect" class="mt-2 w-full bg-slate-900 border border-line rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-calm/70">
              <option>Loading...</option>
            </select>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
          <div id="detectMic" class="rounded-lg border border-line bg-ink/60 px-3 py-2 text-sm">Mic Active: <span class="text-slate-400">No</span></div>
          <div id="detectMeet" class="rounded-lg border border-line bg-ink/60 px-3 py-2 text-sm">Google Meet: <span class="text-slate-400">No</span></div>
          <div id="detectWhatsApp" class="rounded-lg border border-line bg-ink/60 px-3 py-2 text-sm">WhatsApp: <span class="text-slate-400">No</span></div>
        </div>

        <div class="flex flex-col gap-3 md:flex-row md:items-center">
          <button id="recordBtn" class="rounded-xl bg-calm hover:bg-sky-400 text-slate-900 font-semibold px-5 py-3 transition">Start Recording</button>
          <p id="backendMessage" class="text-sm text-slate-400 font-mono">Backend: connecting...</p>
        </div>
      </div>

      <section class="px-6 pb-6">
        <h2 class="text-sm font-semibold text-slate-300 mb-4 uppercase tracking-[0.18em]">Integrations</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          
          <div class="rounded-xl border border-line bg-ink/60 p-4">
            <div class="flex items-center justify-between">
              <p class="text-xs uppercase tracking-[0.18em] text-slate-400">Notion</p>
              <button id="notionToggle" class="w-10 h-5 rounded-full bg-slate-700 relative transition">
                <span class="absolute left-0.5 top-0.5 w-4 h-4 rounded-full bg-slate-400 transition"></span>
              </button>
            </div>
            <input type="password" id="notionKey" placeholder="Notion API Key" class="mt-3 w-full bg-slate-900 border border-line rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-calm/70" />
          </div>

          <div class="rounded-xl border border-line bg-ink/60 p-4">
            <div class="flex items-center justify-between">
              <p class="text-xs uppercase tracking-[0.18em] text-slate-400">Gemini</p>
              <button id="geminiToggle" class="w-10 h-5 rounded-full bg-slate-700 relative transition">
                <span class="absolute left-0.5 top-0.5 w-4 h-4 rounded-full bg-slate-400 transition"></span>
              </button>
            </div>
            <input type="password" id="geminiKey" placeholder="Gemini API Key" class="mt-3 w-full bg-slate-900 border border-line rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-calm/70" />
          </div>

          <div class="rounded-xl border border-line bg-ink/60 p-4">
            <div class="flex items-center justify-between">
              <p class="text-xs uppercase tracking-[0.18em] text-slate-400">Whisper</p>
              <select id="whisperMode" class="bg-slate-800 border border-line rounded px-2 py-1 text-xs">
                <option value="local">Local</option>
                <option value="api">API</option>
              </select>
            </div>
            <input type="password" id="whisperKey" placeholder="OpenAI API Key (if API mode)" class="mt-3 w-full bg-slate-900 border border-line rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-calm/70" />
          </div>

        </div>
      </section>

      <footer class="px-6 py-3 border-t border-line flex items-center justify-between text-xs text-slate-400 font-mono">
        <span id="ffmpegStatus">ffmpeg pending</span>
        <span>v0.2.0</span>
      </footer>
    </section>
  </main>

  <script src="renderer.js"></script>
</body>
</html>
